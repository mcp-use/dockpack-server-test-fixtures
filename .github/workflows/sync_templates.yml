name: Sync mcp-use Templates

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 06:00 UTC
  workflow_dispatch:       # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scaffold TypeScript templates
        run: |
          for template in starter mcp-ui apps-sdk; do
            fixture="mcp-use-$template"
            tmp_dir="/tmp/scaffold-$template"

            # Preserve manifest and expected Dockerfile
            cp "$fixture/manifest.json" /tmp/manifest-$template.json
            cp "$fixture/expected.Dockerfile" /tmp/expected-$template.Dockerfile

            # Scaffold into temp dir (CLI rejects paths and existing dirs)
            cd /tmp
            rm -rf "scaffold-$template"
            npx create-mcp-use-app "scaffold-$template" --template "$template" --no-install --no-git --npm > /dev/null
            cd -

            # Replace fixture contents
            find "$fixture" -mindepth 1 -delete
            cp -r "/tmp/scaffold-$template"/. "$fixture"/

            # Restore manifest and expected Dockerfile
            cp /tmp/manifest-$template.json "$fixture/manifest.json"
            cp /tmp/expected-$template.Dockerfile "$fixture/expected.Dockerfile"

            echo "Synced $fixture"
          done

      - name: Sync Python starter
        run: |
          fixture="mcp-use-python-starter"

          cp "$fixture/manifest.json" /tmp/manifest-python.json
          cp "$fixture/expected.Dockerfile" /tmp/expected-python.Dockerfile

          git clone --depth 1 https://github.com/mcp-use/python-server-starter.git /tmp/python-starter
          find "$fixture" -mindepth 1 -delete
          rsync -a --exclude='.git' /tmp/python-starter/ "$fixture/"

          cp /tmp/manifest-python.json "$fixture/manifest.json"
          cp /tmp/expected-python.Dockerfile "$fixture/expected.Dockerfile"

          echo "Synced $fixture"

      - name: Check for changes
        id: diff
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --staged --stat
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync mcp-use templates from latest published packages"
          git push
