name: Sync mcp-use Templates

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 06:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scaffold TypeScript templates
        run: |
          # template_arg is what we pass to the CLI
          # fixture_name is the directory name in this repo
          scaffold() {
            local template_arg="$1"
            local fixture_name="$2"

            cp "$fixture_name/manifest.json" "/tmp/manifest-$fixture_name.json"
            cp "$fixture_name/expected.Dockerfile" "/tmp/expected-$fixture_name.Dockerfile"

            cd /tmp
            rm -rf "scaffold-$fixture_name"
            npx create-mcp-use-app "scaffold-$fixture_name" --template "$template_arg" --no-install --no-git --npm > /dev/null
            cd -

            find "$fixture_name" -mindepth 1 -delete
            cp -r "/tmp/scaffold-$fixture_name"/. "$fixture_name"/

            cp "/tmp/manifest-$fixture_name.json" "$fixture_name/manifest.json"
            cp "/tmp/expected-$fixture_name.Dockerfile" "$fixture_name/expected.Dockerfile"

            echo "Synced $fixture_name (template: $template_arg)"
          }

          # mcp-apps is the canonical name; apps-sdk is accepted as an alias
          scaffold "mcp-apps" "mcp-use-mcp-apps"
          scaffold "starter"  "mcp-use-starter"

      - name: Sync Python starter
        run: |
          fixture="mcp-use-python-starter"

          cp "$fixture/manifest.json" /tmp/manifest-python.json
          cp "$fixture/expected.Dockerfile" /tmp/expected-python.Dockerfile

          git clone --depth 1 https://github.com/mcp-use/python-server-starter.git /tmp/python-starter
          find "$fixture" -mindepth 1 -delete
          rsync -a --exclude='.git' /tmp/python-starter/ "$fixture/"

          cp /tmp/manifest-python.json "$fixture/manifest.json"
          cp /tmp/expected-python.Dockerfile "$fixture/expected.Dockerfile"

          echo "Synced $fixture"

      - name: Check for changes
        id: diff
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --staged --stat
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync mcp-use templates from latest published packages"
          git push

      - name: Trigger Docker build workflow
        if: steps.diff.outputs.changed == 'true'
        run: gh workflow run build_dockerfiles.yml
        env:
          GH_TOKEN: ${{ github.token }}
